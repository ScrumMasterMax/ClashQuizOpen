<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung - ClashQuiz</title>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #D8B34B;
      --light-gray: #D4D5D7;
      --medium-gray: #9A9DA3;
      --dark-gray: #585B61;
      --dark-blue: #1B1C20;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: var(--dark-blue);
      background-color: #fff;
    }

    header {
      background-color: var(--dark-blue);
      padding: 1.2rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
      color: var(--gold);
      font-weight: 700;
      font-size: 1.5rem;
    }

    .logo-img {
      height: 45px;
      width: auto;
    }

    .back-link {
      color: var(--light-gray);
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--gold);
    }

    .register-hero {
      background: linear-gradient(135deg, var(--dark-blue) 0%, var(--dark-gray) 100%);
      color: #fff;
      padding: 5rem 2rem;
      text-align: center;
    }

    .register-hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .register-hero .highlight {
      color: var(--gold);
    }

    .register-hero p {
      color: var(--light-gray);
      max-width: 700px;
      margin: 0 auto;
      font-size: 1.1rem;
    }

    .register-section {
      background-color: var(--light-gray);
      padding: 5rem 2rem;
    }

    .register-card {
      max-width: 700px;
      margin: 0 auto;
      background-color: #fff;
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      border-top: 5px solid var(--gold);
    }

    .register-card h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--dark-blue);
      font-size: 2rem;
    }

    .register-card p.subtitle {
      text-align: center;
      color: var(--medium-gray);
      margin-bottom: 2rem;
    }

    .register-form {
      display: grid;
      gap: 1rem;
    }

    .register-form input {
      width: 100%;
      padding: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .register-form input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216, 179, 75, 0.2);
    }

    .btn {
      padding: 1rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-primary {
      background-color: var(--gold);
      color: var(--dark-blue);
    }

    .btn-primary:hover {
      background-color: #c9a03f;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(216, 179, 75, 0.3);
    }

    .message {
      margin-top: 1rem;
      text-align: center;
      font-weight: 500;
      min-height: 1.5rem;
    }

    footer {
      background-color: var(--dark-blue);
      color: var(--light-gray);
      padding: 3rem 2rem;
      text-align: center;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-bottom {
      color: var(--medium-gray);
    }

    @media (max-width: 768px) {
      .register-hero h1 {
        font-size: 2.2rem;
      }

      .register-card {
        padding: 2rem 1.5rem;
      }

      nav {
        padding: 0 1rem;
      }

      .logo-img {
        height: 35px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo-container">
        <img src="images/clash_quiz_logo.png" alt="ClashQuiz Logo - Lernquiz" class="logo-img" />
        ClashQuiz
      </a>
      <a href="index.html" class="back-link">Zurück zur Startseite</a>
    </nav>
  </header>

  <section class="register-hero">
    <h1>Dein <span class="highlight">ClashQuiz</span>-Konto</h1>
    <p>Registriere dich kostenlos und starte mit deinem persönlichen Lernprofil.</p>
  </section>

  <section class="register-section">
    <div class="register-card">
      <h2>Registrierung</h2>
      <p class="subtitle">Erstelle dein Konto mit deinen persönlichen Angaben.</p>

      <form id="register-form" class="register-form">
        <input type="text" id="first_name" placeholder="Vorname" required>
        <input type="text" id="last_name" placeholder="Nachname" required>
        <input type="text" id="class_name" placeholder="Klassenbezeichnung" required>
        <input type="email" id="register_email" placeholder="E-Mail" required>
        <input type="password" id="register_password" placeholder="Passwort" required>
        <button type="submit" class="btn btn-primary">Registrieren</button>
      </form>

      <p id="register-message" class="message"></p>
    </div>
  </section>

  <footer>
    <div class="footer-content">
      <div class="footer-bottom">
        <p>&copy; 2026 ClashQuiz. Alle Rechte vorbehalten. | Intelligentes Lernen für alle.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
